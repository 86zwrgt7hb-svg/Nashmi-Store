  <text x="118" y="153" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#15803d">Fashion</text>
  <text x="118" y="163" font-family="Arial, sans-serif" font-size="7" fill="#059669">Active</text>
  <rect x="100" y="170" width="20" height="3" rx="1" fill="#10b77f" opacity="0.6"/>
  <rect x="125" y="170" width="15" height="3" rx="1" fill="#10b77f" opacity="0.4"/>
  
  <!-- Store 2 -->
  <rect x="195" y="140" width="90" height="45" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
