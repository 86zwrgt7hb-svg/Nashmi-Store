  <text x="460" y="152" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Revenue</text>
  <circle cx="460" cy="164" r="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <path d="M460 158 L466 164 L460 170 L454 164 Z" fill="#f59e0b" opacity="0.3"/>
  
  <!-- Users Stats -->
  <rect x="440" y="180" width="40" height="15" rx="2" fill="#10b77f" opacity="0.1"/>
  <text x="460" y="185" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#10b77f" text-anchor="middle">15K+</text>
  <text x="460" y="192" font-family="Arial, sans-serif" font-size="4" fill="#059669" text-anchor="middle">Active Users</text>
  
  <!-- Title -->
