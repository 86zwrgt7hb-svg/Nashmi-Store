  <text x="218" y="153" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#1e40af">Electronics</text>
  <text x="218" y="163" font-family="Arial, sans-serif" font-size="7" fill="#2563eb">Active</text>
  <rect x="200" y="170" width="25" height="3" rx="1" fill="#3b82f6" opacity="0.6"/>
  <rect x="230" y="170" width="12" height="3" rx="1" fill="#3b82f6" opacity="0.4"/>
  
  <!-- Store 3 -->
  <rect x="295" y="140" width="90" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
