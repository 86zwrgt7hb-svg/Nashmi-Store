    <circle cx="350" cy="345" r="8" fill="#ec4899" opacity="0.1"/>
    <path d="M346 341 L354 341 L354 349 L346 349 Z M350 337 L350 341" stroke="#ec4899" stroke-width="1" fill="none"/>
    <text x="350" y="358" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#374151" text-anchor="middle">Support</text>
    <text x="350" y="366" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">24/7 Help</text>
