  <text x="250" y="45" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Multi-Store Management Dashboard</text>
  
  <!-- Bottom Features -->
  <rect x="50" y="330" width="400" height="45" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
  
  <!-- Feature 1 -->
  <g>
    <circle cx="125" cy="345" r="8" fill="#10b77f" opacity="0.1"/>
    <rect x="121" y="341" width="8" height="8" rx="1" fill="#10b77f"/>
    <text x="125" y="358" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#374151" text-anchor="middle">Multi-Store</text>
    <text x="125" y="366" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Management</text>
  </g>
  
  <!-- Feature 2 -->
  <g>
    <circle cx="200" cy="345" r="8" fill="#3b82f6" opacity="0.1"/>
    <circle cx="200" cy="345" r="4" fill="#3b82f6"/>
    <text x="200" y="358" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#374151" text-anchor="middle">Analytics</text>
    <text x="200" y="366" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Real-time</text>
  </g>
  
  <!-- Feature 3 -->
  <g>
    <circle cx="275" cy="345" r="8" fill="#f59e0b" opacity="0.1"/>
    <rect x="271" y="341" width="8" height="8" rx="1" fill="#f59e0b"/>
    <text x="275" y="358" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#374151" text-anchor="middle">Easy Setup</text>
    <text x="275" y="366" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Quick Start</text>
  </g>
  
  <!-- Feature 4 -->
