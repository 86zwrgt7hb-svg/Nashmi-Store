  <text x="460" y="102" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Sales</text>
  <path d="M445 118 L448 115 L451 117 L454 113 L457 115 L460 112 L463 114 L466 111 L469 113 L472 110 L475 112" stroke="#10b77f" stroke-width="1.5" fill="none"/>
  
  <!-- Orders Chart -->
  <rect x="440" y="130" width="40" height="18" rx="2" fill="#f3f4f6"/>
  <text x="460" y="127" font-family="Arial, sans-serif" font-size="5" fill="#6b7280" text-anchor="middle">Orders</text>
