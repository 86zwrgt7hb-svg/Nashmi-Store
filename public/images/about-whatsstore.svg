  <rect x="447" y="140" width="3" height="6" fill="#3b82f6"/>
  <rect x="451" y="138" width="3" height="8" fill="#3b82f6"/>
  <rect x="455" y="141" width="3" height="5" fill="#3b82f6"/>
  <rect x="459" y="139" width="3" height="7" fill="#3b82f6"/>
  <rect x="463" y="143" width="3" height="3" fill="#3b82f6"/>
  <rect x="467" y="140" width="3" height="6" fill="#3b82f6"/>
  <rect x="471" y="142" width="3" height="4" fill="#3b82f6"/>
  
