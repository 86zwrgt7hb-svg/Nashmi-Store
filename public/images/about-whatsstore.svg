  <rect x="323" y="170" width="20" height="3" rx="1" fill="#f59e0b" opacity="0.4"/>
  
  <!-- Store 4 -->
  <rect x="95" y="195" width="90" height="45" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
