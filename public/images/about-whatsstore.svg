  <rect x="155" y="120" width="40" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="205" y="120" width="35" height="6" rx="2" fill="#e5e7eb"/>
  <rect x="250" y="120" width="45" height="6" rx="2" fill="#e5e7eb"/>
  
  <!-- Store Cards Grid -->
  <!-- Store 1 -->
  <rect x="95" y="140" width="90" height="45" rx="6" fill="#dcfce7" stroke="#10b77f" stroke-width="1"/>
